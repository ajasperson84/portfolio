<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew Jasperson — Director &amp; Creative Director</title>
  <meta name="description" content="Andrew Jasperson — Director and Creative Director. Selected work." />

  <!-- Favicons (Anton wordmark monogram) -->
  <link rel="icon" href="/assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
  <link rel="apple-touch-icon" href="/assets/favicon-180.png" />

  <!-- Social share card (Open Graph + Twitter). NOTE: for reliable previews,
       set og:url and og:image to your ABSOLUTE production URL once known. -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Andrew Jasperson — Director &amp; Creative Director" />
  <meta property="og:description" content="Director &amp; Creative Director. Selected work." />
  <meta property="og:image" content="/assets/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Andrew Jasperson — Director &amp; Creative Director" />
  <meta name="twitter:description" content="Director &amp; Creative Director. Selected work." />
  <meta name="twitter:image" content="/assets/og-image.png" />

  <!-- Fonts: bold grotesques, self-fallback to system grotesque stack -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-view="landing">
  <!-- Transition wipe overlay -->
  <div class="wipe" aria-hidden="true"></div>

  <!-- Fixed UI: top bar -->
  <header class="topbar">
    <button class="topbar__brand" type="button" data-action="home" aria-label="Andrew Jasperson — home">
      <span>Andrew</span><span>Jasperson</span>
    </button>
    <nav class="topbar__nav">
      <button class="topbar__link" type="button" data-action="work">Work</button>
      <button class="topbar__link" type="button" data-action="about">About</button>
      <button class="topbar__link" type="button" data-action="contact">Contact</button>
    </nav>
  </header>

  <!-- ===== LANDING ===== -->
  <section class="landing" id="landing">
    <button class="landing__name" type="button" data-action="work" aria-label="Enter — view work">
      <span class="landing__line">ANDREW</span>
      <span class="landing__line">JASPERSON</span>
    </button>
    <span class="landing__enter">Click the name — or scroll — to enter</span>
  </section>

  <!-- ===== WORK INDEX ===== -->
  <main class="work" id="work" hidden>
    <h1 class="work__heading">Selected Work</h1>
    <ol class="work__list" id="work-list"><!-- populated by js --></ol>
  </main>

  <!-- Hover preview that follows the cursor over the work list -->
  <div class="preview" id="preview" aria-hidden="true">
    <div class="preview__media" id="preview-media"></div>
  </div>

  <!-- ===== PROJECT DETAIL (overlay) ===== -->
  <article class="detail" id="detail" hidden>
    <header class="detail__head">
      <span class="detail__index" id="detail-index"></span>
      <h1 class="detail__title" id="detail-title"></h1>
      <div class="detail__meta">
        <span id="detail-role"></span>
      </div>
      <p class="detail__tagline" id="detail-tagline"></p>
    </header>
    <div class="detail__body">
      <p class="detail__desc" id="detail-desc"></p>
      <div class="detail__media" id="detail-media"></div>
    </div>

    <!-- Prev / next project navigation (hover shows the CRT preview) -->
    <nav class="detail__nav" id="detail-nav" aria-label="Project navigation">
      <button class="detail__nav-link detail__nav-link--prev" type="button"
              id="detail-prev" data-project="">
        <span class="detail__nav-label">Prev</span>
        <span class="detail__nav-title" id="detail-prev-title"></span>
      </button>
      <button class="detail__nav-link detail__nav-link--next" type="button"
              id="detail-next" data-project="">
        <span class="detail__nav-label">Next</span>
        <span class="detail__nav-title" id="detail-next-title"></span>
      </button>
    </nav>
  </article>

  <!-- ===== ABOUT (overlay) ===== -->
  <article class="about" id="about" hidden>
    <div class="about__inner">
      <p class="about__lead">
        Director &amp; Creative Director working with brands, agencies, artists
        and via commercial representation with
        <a class="about__link" href="https://www.imperial.tv/directors/andrew-jasperson/"
           target="_blank" rel="noopener noreferrer">Imperial Woodpecker</a>.
      </p>
      <button class="about__contact" type="button" data-action="contact">Get in touch →</button>
    </div>
  </article>

  <!-- ===== CONTACT (overlay) ===== -->
  <article class="contact" id="contact" hidden>
    <div class="contact__inner">
      <h1 class="contact__title">Get in touch</h1>

      <form class="contact__form" id="contact-form"
            action="https://formsubmit.co/ajasperson@gmail.com" method="POST">
        <!-- FormSubmit configuration -->
        <input type="hidden" name="_template" value="table" />
        <input type="hidden" name="_captcha" value="true" />
        <input type="hidden" name="_next" id="contact-next" value="" />
        <!-- Honeypot: bots fill this hidden field; humans never see it -->
        <input type="text" name="_honey" class="contact__honey"
               tabindex="-1" autocomplete="off" aria-hidden="true" />

        <label class="contact__field">
          <span class="contact__label">Your email</span>
          <input type="email" name="email" required placeholder="you@studio.com" />
        </label>

        <label class="contact__field">
          <span class="contact__label">Subject</span>
          <input type="text" name="_subject" required placeholder="What's this about?" />
        </label>

        <label class="contact__field">
          <span class="contact__label">Message</span>
          <textarea name="message" rows="6" required placeholder="Tell me about it."></textarea>
        </label>

        <button type="submit" class="contact__submit">Send →</button>
      </form>

      <div class="contact__success" id="contact-success" hidden>
        <h2 class="contact__success-title">Message sent.</h2>
        <p class="contact__success-body">Thanks — I'll be in touch.</p>
      </div>
    </div>
  </article>

  <!-- Vimeo Player API: lets the site detect when a video ends -->
  <script src="https://player.vimeo.com/api/player.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
